apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-content
  namespace: postgres-frontend-demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>RHACM Day 2 Sync Wave Demo</title>
      <style>
        body { font-family: sans-serif; margin: 0; background: #f5f5f5; color: #151515; }
        main { max-width: 900px; margin: 0 auto; padding: 48px 24px; }
        .card { background: white; border: 1px solid #d2d2d2; border-radius: 16px; padding: 32px; }
        h1 { margin-top: 0; font-size: 38px; line-height: 1.1; }
        .badge { display: inline-block; background: #ee0000; color: white; padding: 6px 12px; border-radius: 999px; font-weight: 700; }
        li { margin: 12px 0; font-size: 18px; }
        code { background: #f0f0f0; padding: 2px 6px; border-radius: 6px; }
      </style>
    </head>
    <body>
      <main>
        <div class="card">
          <span class="badge">Argo CD Sync Waves</span>
          <h1>Frontend started after PostgreSQL was ready</h1>
          <p>This app is designed for a customer demo of ordered Day 2 delivery with RHACM and Argo CD.</p>
          <ol>
            <li><strong>Wave -4 to -1:</strong> namespace, secret, service, PostgreSQL deployment</li>
            <li><strong>Wave 0:</strong> database seed job waits for PostgreSQL and creates demo data</li>
            <li><strong>Wave 1 to 3:</strong> web frontend, service, route</li>
            <li><strong>Wave 4:</strong> smoke test validates the frontend route path</li>
          </ol>
          <p>The frontend deployment also has an init container that waits for the seeded database table before Apache starts.</p>
        </div>
      </main>
    </body>
    </html>
