apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-seed
  namespace: postgres-frontend-demo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: postgres-seed
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: postgres-seed
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: registry.redhat.io/rhel9/postgresql-16:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: database-user
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: database-password
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: database-name
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: database-password
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for PostgreSQL to accept connections"
              until pg_isready -h postgres -p 5432 -U "$POSTGRESQL_USER" -d "$POSTGRESQL_DATABASE"; do
                sleep 5
              done

              echo "Creating demo table and seed data"
              psql -h postgres -p 5432 -U "$POSTGRESQL_USER" -d "$POSTGRESQL_DATABASE" <<'SQL'
              CREATE TABLE IF NOT EXISTS demo_items (
                id SERIAL PRIMARY KEY,
                name TEXT NOT NULL,
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );
              INSERT INTO demo_items (name)
              SELECT 'Database was ready before the frontend started'
              WHERE NOT EXISTS (SELECT 1 FROM demo_items WHERE name = 'Database was ready before the frontend started');
              SQL

              echo "Database seed complete"
